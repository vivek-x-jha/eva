filekinds:
  directory:
    foreground: Blue
  symlink:
    foreground: Cyan
  executable:
    foreground: Green
icons:
  # Sparse defaults for built-in fallback icons. Named directory icons,
  # filename overrides, and extension overrides still take precedence.
  folder: { glyph: "" }
  empty_folder: { glyph: "" }
  file: { glyph: "" }
  unknown_file: { glyph: "" }
git:
  staged: { foreground: Green }
  new: { foreground: Red }
  modified: { foreground: Yellow }
  deleted: { foreground: Red }
  renamed: { foreground: Yellow }
  typechange: { foreground: Yellow }
  ignored: { foreground: DarkGray }
  conflicted: { foreground: LightRed }
git_markers:
  staged: "+"
  new: "?"
  modified: "~"
  renamed: "~"
  typechange: "~"
  ignored: "I"
  conflicted: "!"
perms:
  user_read:
    foreground: Yellow
    is_bold: true
  user_write:
    foreground: Red
    is_bold: true
  user_execute_file:
    foreground: Green
    is_bold: true
  user_execute_other:
    foreground: Green
    is_bold: true
  group_read:
    foreground: Yellow
  group_write:
    foreground: Red
  group_execute:
    foreground: Green
  other_read:
    foreground: Yellow
  other_write:
    foreground: Red
  other_execute:
    foreground: Green
filenames:
  # Just change the icon glyph
  Cargo.toml: {icon: {glyph: 🦀}}
  Cargo.lock: {icon: {glyph: 🦀}}
extensions:
  # Change the filename color and icon
  # NOTE: not all unicode glyphs support color changes
  rs: {filename: {foreground: Red}, icon: {glyph: 🦀}}
  # Change the icon glyph and color
  nix: {icon: {glyph: ❄, style: {foreground: White}}}
